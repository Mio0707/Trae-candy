<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>吹糖造物 - 天门糖塑互动体验</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #2a1408;
  --bg-warm: #3a1a0a;
  --fg: #f5e6d3;
  --fg-muted: #c49a6c;
  --red: #e8442a;
  --gold: #f1bc36;
  --amber: #e89b3c;
  --sugar: #c49a6c;
  --card-bg: rgba(42,20,8,0.85);
  --border: rgba(228,155,60,0.25);
  --radius: 12px;
}

html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.6;
}

.hidden { display: none !important; }

/* ============================================================
   LANDING PAGE — full-bleed warm poster
   ============================================================ */
#landing {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(170deg, #4a200a 0%, #2a1408 45%, #1a0a02 100%);
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), visibility 0.8s;
}
#landing.out { opacity: 0; visibility: hidden; pointer-events: none; }

#landing::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 35%, rgba(232,68,42,0.16) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 75%, rgba(241,188,54,0.10) 0%, transparent 60%);
  animation: landingPulse 6s ease-in-out infinite alternate;
}
@keyframes landingPulse {
  0% { opacity: 0.4; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.03); }
}

#landing::after {
  content: ''; position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px;
  opacity: 0.5;
  pointer-events: none;
}

.landing-inner {
  position: relative; z-index: 1;
  width: 100%; max-width: 560px;
  padding: 40px 32px;
  display: flex; flex-direction: column; align-items: center;
}

/* Hero: brand as the loudest element */
.landing-title {
  font-size: clamp(2.4rem, 8vw, 3.4rem);
  font-weight: 900;
  letter-spacing: clamp(6px, 3vw, 12px);
  background: linear-gradient(135deg, var(--red) 0%, var(--gold) 45%, var(--amber) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 80px rgba(241,188,54,0.25);
  animation: titleReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.15s forwards;
  opacity: 0;
  margin-bottom: 16px;
}
@keyframes titleReveal {
  0% { opacity: 0; transform: translateY(20px) scale(0.95); letter-spacing: 24px; }
  100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: clamp(6px, 3vw, 12px); }
}

.landing-sub {
  font-size: 0.92rem;
  color: var(--amber);
  letter-spacing: 4px;
  opacity: 0.8;
  animation: fadeUp 0.8s 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

/* Thin divider — structural anchor */
.landing-divider {
  width: 1px; height: 40px;
  background: linear-gradient(180deg, transparent, rgba(232,155,60,0.4), transparent);
  margin: 28px 0;
  animation: dividerGrow 0.8s 0.65s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes dividerGrow {
  from { transform: scaleY(0); }
  to { transform: scaleY(1); }
}

/* Detail: product copy */
.landing-desc {
  font-size: 0.88rem;
  color: var(--fg-muted);
  line-height: 2;
  text-align: center;
  max-width: 380px;
  animation: fadeUp 0.8s 0.75s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CTA: mode choices */
.landing-choices {
  display: flex; gap: 48px; justify-content: center;
  margin-top: 40px;
  animation: fadeUp 0.8s 0.95s cubic-bezier(0.16,1,0.3,1) both;
}

.choice-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 0;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  font-family: inherit; color: var(--fg);
  position: relative;
}
.choice-btn::after {
  content: ''; position: absolute; bottom: -8px; left: 50%;
  width: 0; height: 1px;
  background: var(--gold);
  transform: translateX(-50%);
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
}
.choice-btn:hover::after { width: 100%; }
.choice-btn:hover { transform: translateY(-2px); }
.choice-btn:active { transform: translateY(0) scale(0.97); }

.choice-icon {
  font-size: 1.5rem;
  transition: all 0.3s ease;
}
.choice-icon.camera { color: var(--red); }
.choice-icon.button { color: var(--gold); }
.choice-btn:hover .choice-icon { transform: scale(1.15); }

.choice-label { font-size: 0.95rem; font-weight: 600; letter-spacing: 2px; }
.choice-hint { font-size: 0.72rem; color: var(--fg-muted); opacity: 0.7; }

.landing-footer {
  position: absolute; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.65rem; color: rgba(196,138,76,0.35);
  letter-spacing: 2px;
  white-space: nowrap;
  animation: fadeUp 0.8s 1.2s cubic-bezier(0.16,1,0.3,1) both;
}

/* ============================================================
   IMMERSIVE STAGE — full-screen, all UI overlaid
   ============================================================ */
#stage-page {
  position: fixed; inset: 0;
  display: none;
}
#stage-page.active { display: block; }

/* Full-screen 3D container */
#beast-stage {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 45%, #3a1a0a 0%, #1e0e04 100%);
}
#beast-stage canvas {
  display: block; width: 100% !important; height: 100% !important;
  position: relative; z-index: 2;
}

/* Camera background */
#camera-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  transform: scaleX(-1);
  opacity: 0; transition: opacity 0.6s ease;
  pointer-events: none;
}
#camera-bg.active { opacity: 1; }
#camera-bg-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(58,26,10,0.35) 0%, rgba(30,14,4,0.6) 100%),
              linear-gradient(180deg, rgba(232,155,60,0.08) 0%, transparent 50%, rgba(232,68,42,0.06) 100%);
  z-index: 1; opacity: 0; transition: opacity 0.6s ease;
  pointer-events: none;
}
#camera-bg-overlay.active { opacity: 1; }

/* Hidden video for MediaPipe */
#video-preview {
  position: absolute; width: 1px; height: 1px;
  opacity: 0; pointer-events: none; z-index: -1;
}

/* ---- Overlaid UI elements ---- */

/* Top-left: title */
#stage-title {
  position: absolute; top: 24px; left: 28px; z-index: 20;
  font-size: 1.1rem; font-weight: 800; letter-spacing: 4px;
  color: var(--fg); opacity: 0.7;
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  transition: opacity 0.4s;
}

/* Top-right: minimal progress dots */
#stage-progress {
  position: absolute; top: 28px; right: 28px; z-index: 20;
  display: flex; gap: 8px; align-items: center;
}
.prog-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(196,154,108,0.25);
  border: 1.5px solid rgba(196,154,108,0.3);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.prog-dot.completed {
  background: var(--gold); border-color: var(--gold);
  box-shadow: 0 0 8px rgba(241,188,54,0.4);
}
.prog-dot.active {
  background: var(--red); border-color: var(--red);
  box-shadow: 0 0 12px rgba(215,51,39,0.5);
  transform: scale(1.3);
}
.prog-name {
  font-size: 0; width: 0; overflow: hidden;
  transition: all 0.3s;
}
.prog-dot.active + .prog-name,
.prog-dot.completed + .prog-name {
  /* names hidden for minimal look */
}

/* Center-top: 非遗小识 overlay */
#step-overlay {
  position: absolute;
  top: 22%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 30;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
#step-overlay.visible { opacity: 1; }

#step-overlay .step-title {
  display: none;
}
#step-overlay .step-desc {
  font-size: 0.88rem;
  font-weight: 600;
  color: #fff;
  max-width: 460px;
  margin: 0 auto;
  line-height: 1.8;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7), 0 0 30px rgba(241,188,54,0.2);
}

/* Bottom-center: gesture prompt */
#gesture-prompt {
  position: absolute;
  bottom: 160px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  text-align: center;
  pointer-events: none;
}

.gesture-hint-text {
  font-size: 1rem; font-weight: 600;
  color: var(--gold); letter-spacing: 2px;
  text-shadow: 0 2px 12px rgba(241,188,54,0.4);
  animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.gesture-status-text {
  font-size: 0.8rem; color: var(--fg-muted);
  margin-top: 6px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.5);
}

/* Bottom-left: knowledge bubble (非遗小识) */
#knowledge-float {
  position: absolute;
  bottom: 140px; left: 28px; right: 28px;
  z-index: 20;
  max-width: 360px;
  padding: 16px 20px;
  background: var(--card-bg);
  border-left: 3px solid var(--sugar);
  border-radius: 0 10px 10px 0;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
}
#knowledge-float.visible {
  opacity: 1; transform: translateY(0);
}

.knowledge-tag {
  font-size: 0.65rem; font-weight: 700; color: var(--sugar);
  letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase;
}
#knowledge-text {
  font-size: 0.82rem; color: var(--fg-muted); line-height: 1.7;
}

/* Bottom-right: control buttons (minimal) */
#stage-controls {
  position: absolute; bottom: 24px; right: 28px; z-index: 20;
  display: flex; gap: 10px; align-items: center;
}

.ctrl-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(196,154,108,0.1);
  border: 1px solid var(--border);
  color: var(--fg-muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; cursor: pointer;
  transition: all 0.25s;
  font-family: inherit;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.ctrl-btn:hover { background: rgba(196,154,108,0.2); color: var(--fg); border-color: rgba(196,154,108,0.4); }
.ctrl-btn:active { transform: scale(0.92); }
.ctrl-btn.primary {
  background: rgba(215,51,39,0.2); border-color: rgba(215,51,39,0.4);
  color: var(--red); font-weight: 700;
}
.ctrl-btn.primary:hover { background: rgba(215,51,39,0.3); }
.ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

/* "继续造物" prominent button */
#btn-next {
  width: auto; border-radius: 22px; padding: 0 24px;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
}

/* Bottom-left: camera button */
#camera-controls {
  position: absolute; bottom: 24px; left: 28px; z-index: 20;
  display: flex; gap: 10px;
}

/* Loading & Error overlays */
#loading-indicator {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(13,6,4,0.9); z-index: 50;
}
.spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(196,154,108,0.15);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--fg-muted); font-size: 0.9rem; letter-spacing: 1px; }

#model-error {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(13,6,4,0.92); z-index: 50;
  padding: 40px; text-align: center;
}
#model-error .error-icon { font-size: 3rem; margin-bottom: 16px; }
#model-error .error-title { font-size: 1.1rem; font-weight: 700; color: var(--red); margin-bottom: 8px; }
#model-error .error-detail { font-size: 0.85rem; color: var(--fg-muted); }

/* ---- Complete overlay (fortune reveal) ---- */
#complete-overlay {
  position: absolute; inset: 0; z-index: 40;
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(13,6,4,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: completeFadeIn 0.8s ease forwards;
}
#complete-overlay.visible { display: flex; }
@keyframes completeFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#fortune-label {
  width: 100px; height: 100px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; font-weight: 900; color: #fff;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(215,51,39,0.3);
}
#fortune-name {
  font-size: 1.5rem; font-weight: 800; letter-spacing: 4px;
  margin-bottom: 8px;
}
#fortune-blessing {
  font-size: 0.95rem; color: var(--fg-muted);
  margin-bottom: 32px; max-width: 320px; text-align: center;
}

.complete-actions { display: flex; gap: 12px; }
.complete-btn {
  padding: 12px 28px; border-radius: 24px;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
  font-family: inherit; letter-spacing: 1px;
  transition: all 0.25s; border: none;
}
.complete-btn:active { transform: scale(0.95); }
.complete-btn.primary {
  background: var(--red); color: #fff;
  box-shadow: 0 4px 20px rgba(215,51,39,0.3);
}
.complete-btn.secondary {
  background: rgba(241,188,54,0.15); color: var(--gold);
  border: 1px solid rgba(241,188,54,0.3);
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .landing-title { font-size: 2.4rem; letter-spacing: 8px; }
  .landing-choices { flex-direction: column; align-items: center; }
  .choice-btn { max-width: 280px; }
  #step-overlay .step-title { font-size: 1.5rem; letter-spacing: 4px; }
  #knowledge-float { max-width: 280px; bottom: 160px; }
  #gesture-prompt { bottom: 100px; }
}

@media (max-width: 380px) {
  .landing-title { font-size: 1.8rem; letter-spacing: 6px; }
  .landing-inner { padding: 24px 20px; }
  .choice-btn { padding: 20px 24px; }
}

/* Safe area */
@supports (padding: env(safe-area-inset-bottom)) {
  #stage-controls, #camera-controls {
    bottom: calc(24px + env(safe-area-inset-bottom));
  }
  #gesture-prompt {
    bottom: calc(80px + env(safe-area-inset-bottom));
  }
}
</style>
</head>
<body>

<!-- ============================================================
     LANDING PAGE
     ============================================================ -->
<div id="landing">
  <div class="landing-inner">
    <div class="landing-title">吹糖造物</div>
    <div class="landing-sub">国家级非遗 · 天门糖塑</div>
    <div class="landing-divider"></div>
    <div class="landing-desc">
      天门糖塑距今已有约 1400 年历史，曾被列为"湖北最美非物质文化遗产"。<br>
      通过手势互动，模拟吹、捏、拉、贴等真实工艺，<br>
      制作一只属于自己的糖塑瑞兽。
    </div>
    <div class="landing-choices">
      <button class="choice-btn" id="btn-mode-camera">
        <div class="choice-icon camera">📷</div>
        <div class="choice-label">摄像头交互</div>
        <div class="choice-hint">手势驱动 · 沉浸体验</div>
      </button>
      <button class="choice-btn" id="btn-mode-button">
        <div class="choice-icon button">👆</div>
        <div class="choice-label">按钮交互</div>
        <div class="choice-hint">点击推进 · 轻松体验</div>
      </button>
    </div>
  </div>
  <div class="landing-footer">天门糖塑 · 国家级非物质文化遗产</div>
</div>

<!-- ============================================================
     IMMERSIVE STAGE
     ============================================================ -->
<div id="stage-page">
  <div id="beast-stage">
    <video id="camera-bg" autoplay playsinline muted></video>
    <div id="camera-bg-overlay"></div>
    <div id="loading-indicator">
      <div class="spinner"></div>
      <div class="loading-text">正在加载糖塑瑞兽模型…</div>
    </div>
    <div id="model-error" class="hidden">
      <div class="error-icon">⚠️</div>
      <div class="error-title">模型加载失败</div>
      <div class="error-detail" id="error-message"></div>
    </div>
    <video id="video-preview" autoplay playsinline muted></video>
  </div>

  <!-- Title -->
  <div id="stage-title">吹糖造物</div>

  <!-- Progress dots -->
  <div id="stage-progress">
    <div class="prog-dot" data-phase="0"></div>
    <div class="prog-dot" data-phase="1"></div>
    <div class="prog-dot" data-phase="2"></div>
    <div class="prog-dot" data-phase="3"></div>
    <div class="prog-dot" data-phase="4"></div>
    <div class="prog-dot" data-phase="5"></div>
  </div>

  <!-- Step overlay (center, fades in/out) -->
  <div id="step-overlay">
    <div class="step-title" id="step-title"></div>
    <div class="step-desc" id="step-desc"></div>
  </div>

  <!-- Gesture prompt (bottom center) -->
  <div id="gesture-prompt">
    <div class="gesture-hint-text" id="gesture-hint"></div>
    <div class="gesture-status-text" id="gesture-status"></div>
  </div>

  <!-- Knowledge bubble (bottom left) -->
  <div id="knowledge-float">
    <div class="knowledge-tag">非遗小识</div>
    <div id="knowledge-text"></div>
  </div>

  <!-- Controls (bottom right) -->
  <div id="stage-controls">
    <button class="ctrl-btn primary" id="btn-next" title="继续造物">继续</button>
    <button class="ctrl-btn" id="btn-screen" title="全屏">⛶</button>
    <button class="ctrl-btn" id="btn-reset" title="重新开始">↺</button>
  </div>

  <!-- Camera controls (bottom left) -->
  <div id="camera-controls">
    <button class="ctrl-btn" id="btn-camera" title="开启摄像头">📷</button>
  </div>

  <!-- Complete overlay -->
  <div id="complete-overlay">
    <div id="fortune-label">顺</div>
    <div id="fortune-name">顺遂</div>
    <div id="fortune-blessing">愿你一路顺遂，所行皆有回响。</div>
    <div class="complete-actions">
      <button class="complete-btn primary" id="btn-reset-bottom">再造一只</button>
      <button class="complete-btn secondary" id="btn-share">保存分享卡</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js?v=20260718"></script>
</body>
</html>
